version: "3.8"

services:
  # ==========================================
  # Botola Pro Chatbot Service
  # ==========================================
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botola-chatbot
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      - LLM_PROVIDER=ollama
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral:7b
      
      # Optional: Use cloud API instead of local Ollama
      # - LLM_PROVIDER=mistral
      # - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      # - MISTRAL_MODEL=mistral-medium
      
      # Memory & Performance
      - REDIS_URL=redis://redis:6379/0
      - MAX_TOKENS=512
      - TEMPERATURE=0.3
      
      # Database
      - DATABASE_URL=sqlite:///data/botola_pro.db
    volumes:
      # Persist FAISS index and database between restarts
      - chatbot-data:/app/data/processed
      - chatbot-db:/app/data
      
      # Mount documents for easy updates without rebuild
      - ./data/raw:/app/data/raw:ro
      
      # Optional: mount for development hot-reload
      # - ./src:/app/src:ro
      # - ./main.py:/app/main.py:ro
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - botola-network
    restart: unless-stopped

  # ==========================================
  # Ollama (Local LLM Server)
  # ==========================================
  ollama:
    image: ollama/ollama:latest
    container_name: botola-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - botola-network
    restart: unless-stopped
    # Pull model on first start
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5
        ollama pull mistral:7b
        wait
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================
  # Redis (Conversation Memory)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: botola-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - botola-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ==========================================
  # Optional: pgAdmin for SQLite viewing
  # ==========================================
  # adminer:
  #   image: adminer:latest
  #   container_name: botola-adminer
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - botola-network
  #   restart: unless-stopped

# ==========================================
# Volumes (persist data)
# ==========================================
volumes:
  chatbot-data:
    driver: local
  chatbot-db:
    driver: local
  ollama-models:
    driver: local
  redis-data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  botola-network:
    driver: bridge