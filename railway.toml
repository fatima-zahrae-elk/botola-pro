[build]
builder = "nixpacks"
buildCommand = "pip install fastapi==0.109.0 'uvicorn[standard]==0.27.0' python-multipart==0.0.6 pydantic==2.5.0 httpx==0.26.0 python-dotenv==1.0.0 'numpy==1.26.4' PyPDF2==3.0.1 python-docx==1.1.0 sqlalchemy==2.0.25 langdetect==1.0.9 redis==5.0.1 rank-bm25==0.2.2 'sentence-transformers==2.3.0' 'faiss-cpu==1.7.4'"

[deploy]
startCommand = "cd ChatBot_Botola && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
